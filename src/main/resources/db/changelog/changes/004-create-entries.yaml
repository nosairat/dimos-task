databaseChangeLog:
  - changeSet:
      id: 004-create-entries
      author: dimos
      changes:
        - createTable:
            tableName: entries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: transaction_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entries_transaction
                    references: transactions(id)
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entries_account
                    references: accounts(id)
              - column:
                  name: amount
                  type: decimal(19,3)
                  constraints:
                    nullable: false
              - column:
                  name: updated_balance
                  type: decimal(19,3)
                  constraints:
                    nullable: false
